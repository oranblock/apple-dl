on: push
jobs:
  go:
    runs-on: macos-latest
    steps:
      - name: Fetch manifests
        run: |
          curl -sf -A "AppleTV11,1/1 AtVUI" https://sylvan.apple.com/entries.json -o entries1.json && echo "entries1: ok" || echo "entries1: fail"
          curl -sf -A "AppleTV11,1/1 AtVUI" https://sylvan.apple.com/2/entries.json -o entries2.json && echo "entries2: ok" || echo "entries2: fail"
          curl -sf -A "AppleTV11,1/1 AtVUI" https://sylvan.apple.com/3/entries.json -o entries3.json && echo "entries3: ok" || echo "entries3: fail"
          ls -lh *.json

      - uses: actions/upload-artifact@v4
        with:
          name: manifests
          path: "*.json"
          retention-days: 2
        if: always()
