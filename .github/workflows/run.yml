on: push
jobs:
  go:
    runs-on: macos-latest
    timeout-minutes: 300
    steps:
      - name: Find and extract Snoopy screensavers
        run: |
          echo "=== tvOS volume contents ==="
          ls /Library/Developer/CoreSimulator/Volumes/tvOS_22L572/ 2>/dev/null || echo "checking other..."
          ls /Library/Developer/CoreSimulator/Volumes/ 

          echo "=== Finding all .mov files in tvOS volumes ==="
          for vol in tvOS_22L572 tvOS_23J579 tvOS_23K51; do
            VOL_PATH="/Library/Developer/CoreSimulator/Volumes/$vol"
            if [ -d "$VOL_PATH" ]; then
              echo "--- $vol ---"
              find "$VOL_PATH" -name "*.mov" 2>/dev/null | while read f; do
                SIZE=$(wc -c < "$f")
                echo "$SIZE $f"
              done | sort -rn | head -20
            fi
          done

      - name: Copy all screensaver assets
        run: |
          mkdir -p ~/screensavers
          for vol in tvOS_22L572 tvOS_23J579 tvOS_23K51; do
            VOL_PATH="/Library/Developer/CoreSimulator/Volumes/$vol"
            if [ -d "$VOL_PATH" ]; then
              find "$VOL_PATH" \( -name "*.mov" -o -name "*.heic" \) 2>/dev/null -exec cp {} ~/screensavers/ \;
            fi
          done
          echo "=== Copied files ==="
          ls -lh ~/screensavers/ | sort -k5 -rh | head -30

      - uses: actions/upload-artifact@v4
        with:
          name: snoopy-screensavers
          path: ~/screensavers/
          retention-days: 5
