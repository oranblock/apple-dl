on: push
jobs:
  go:
    runs-on: macos-latest
    timeout-minutes: 300
    steps:
      - name: Boot tvOS sim and extract EVERYTHING
        run: |
          DEVICE_ID=$(xcrun simctl create "SnoopyTV" "Apple TV 4K (3rd generation)" "com.apple.CoreSimulator.SimRuntime.tvOS-18-5")
          xcrun simctl boot "$DEVICE_ID" 2>&1 || true
          sleep 15

          FRAMEWORK="/Library/Developer/CoreSimulator/Volumes/tvOS_22L572/Library/Developer/CoreSimulator/Profiles/Runtimes/tvOS 18.5.simruntime/Contents/Resources/RuntimeRoot/System/Library/PrivateFrameworks/IdleCharacterUI.framework"

          echo "=== Full framework structure ==="
          find "$FRAMEWORK" -not -name "*.mov" -not -name "*.heic" -not -name "*.png" | head -80

          echo "=== All file types ==="
          find "$FRAMEWORK" -type f | sed 's/.*\.//' | sort | uniq -c | sort -rn | head -20

          mkdir -p ~/snoopy_full
          cp -r "$FRAMEWORK/" ~/snoopy_full/
          echo "Total: $(find ~/snoopy_full -type f | wc -l) files, $(du -sh ~/snoopy_full | cut -f1)"

      - uses: actions/upload-artifact@v4
        with:
          name: snoopy-full-framework
          path: ~/snoopy_full/
          retention-days: 7
