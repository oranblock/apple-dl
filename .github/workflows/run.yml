on: push
jobs:
  go:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test sylvan classic videos
        run: curl -sI "https://sylvan.apple.com/Videos/b1-1.mov" | grep -E "HTTP|Content"

      - name: Check newer manifests
        run: python3 check_newer.py

      - name: Get all classic URLs
        run: |
          curl -sf -A "AppleTV11,1/1 AtVUI" "https://sylvan.apple.com/entries.json" -o entries.json
          python3 extract_urls.py

      - uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            all_urls.txt
            newer_manifest.json
          if-no-files-found: ignore
          retention-days: 2
