on: push
jobs:
  go:
    runs-on: macos-latest
    steps:
      - name: Fetch manifest
        run: curl -s -A "AppleTV11,1/1 AtVUI" https://sylvan.apple.com/Apple_TV_4K_v3.json -o manifest.json && wc -c manifest.json

      - name: Find Snoopy URL
        run: python3 -c "import json; d=json.load(open('manifest.json')); urls=[a['url'] for a in d.get('assets',[]) if 'snoopy' in a.get('url','').lower()]; print(urls or [a['url'] for a in d.get('assets',[])[:5]])"

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: manifest.json
          retention-days: 2
