on: push
jobs:
  go:
    runs-on: macos-latest
    timeout-minutes: 300
    steps:
      - name: Explore simulator runtime paths
        run: |
          echo "=== tvOS_22L572 contents ==="
          ls -la /Library/Developer/CoreSimulator/Volumes/tvOS_22L572/ 2>/dev/null | head -20

          echo "=== Full path from article ==="
          ls /Library/Developer/CoreSimulator/Volumes/tvOS_22L572/Library/ 2>/dev/null || echo "no Library"
          find /Library/Developer/CoreSimulator/Volumes/tvOS_22L572/ -maxdepth 5 2>/dev/null | head -30

          echo "=== Alternative paths ==="
          ls /Library/Developer/CoreSimulator/Profiles/Runtimes/ 2>/dev/null | head -20
          ls /Library/Developer/CoreSimulator/Images/ 2>/dev/null | head -20

          echo "=== All simruntime directories ==="
          find / -name "*.simruntime" -maxdepth 8 2>/dev/null | head -20

          echo "=== xcrun simctl ==="
          xcrun simctl runtime list 2>&1 | head -20

      - name: Mount tvOS runtime if needed
        run: |
          xcrun simctl runtime show com.apple.CoreSimulator.SimRuntime.tvOS-18-5 2>&1 || true
          RUNTIME_PATH=$(xcrun simctl runtime show com.apple.CoreSimulator.SimRuntime.tvOS-18-5 2>&1 | grep -i path | awk '{print $NF}')
          echo "Runtime path: $RUNTIME_PATH"
          find "$RUNTIME_PATH" -name "*.mov" 2>/dev/null | head -20 || true
