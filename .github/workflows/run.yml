on: push
jobs:
  go:
    runs-on: macos-latest
    steps:
      - name: Try multiple manifest URLs
        run: |
          for URL in \
            "https://sylvan.apple.com/Apple_TV_4K_v3.json" \
            "https://sylvan.apple.com/Apple_TV_4K_v2.json" \
            "https://sylvan.apple.com/entries.json" \
            "https://atv-ext.apple.com/lazy-assets-v2/select-items"; do
            echo "=== $URL ==="
            curl -sv -A "AppleTV11,1/1 AtVUI" "$URL" 2>&1 | tail -20
            echo ""
          done

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: manifest.json
          retention-days: 2
        if: always()
