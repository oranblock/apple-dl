on: push
jobs:
  go:
    runs-on: macos-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Download full IPSW and list contents
        run: |
          URL="https://updates.cdn-apple.com/2026WinterFCS/fullrestores/089-59495/6689ECF8-1BE4-4250-BECB-5BB9AE719DC0/AppleTV5,3_26.3_23K620_Restore.ipsw"
          echo "Downloading IPSW..."
          curl -L --progress-bar "$URL" -o Restore.ipsw
          ls -lh Restore.ipsw
          echo "Listing contents..."
          unzip -l Restore.ipsw | tee ipsw_files.txt

      - uses: actions/upload-artifact@v4
        with:
          name: ipsw-listing
          path: ipsw_files.txt
          retention-days: 2
