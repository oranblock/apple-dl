on: push
jobs:
  go:
    runs-on: macos-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Install ipsw tool
        run: brew install blacktop/tap/ipsw

      - name: Download IPSW
        run: |
          URL="https://updates.cdn-apple.com/2026WinterFCS/fullrestores/089-59495/6689ECF8-1BE4-4250-BECB-5BB9AE719DC0/AppleTV5,3_26.3_23K620_Restore.ipsw"
          curl -L --progress-bar "$URL" -o Restore.ipsw

      - name: List filesystem and find aerial assets
        run: |
          echo "=== IPSW info ==="
          ipsw info Restore.ipsw 2>&1 | head -30

          echo "=== Search for screensaver/aerial files ==="
          ipsw fw ls Restore.ipsw 2>&1 | grep -i "aerial\|snoopy\|screensaver\|idle\|wallpaper\|tvwall\|TVIdle\|\.mov\|\.mp4" | head -50

          echo "=== All filesystem entries ==="
          ipsw fw ls Restore.ipsw 2>&1 | grep -i "TV\|screen\|video\|media\|asset" | head -50

      - name: Extract screensaver app if found
        run: |
          ipsw extract --dylibs Restore.ipsw --pattern "TVIdle\|AerialScreen\|TVWallpaper\|screensaver" 2>&1 | head -30 || true

      - uses: actions/upload-artifact@v4
        with:
          name: ipsw-analysis
          path: "*.plist"
          retention-days: 2
        if: always()
