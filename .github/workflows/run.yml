on: push
jobs:
  go:
    runs-on: macos-latest
    steps:
      - name: Find tvOS firmware URL
        run: |
          echo "=== Apple TV OTA manifest ==="
          curl -s \
            -H "User-Agent: AppleTV14,1/1 CFNetwork/1490 Darwin/23.0.0" \
            -H "X-Apple-Device: AppleTV14,1" \
            "https://mesu.apple.com/assets/com_apple_MobileAsset_TVWallpaperAerials/com_apple_MobileAsset_TVWallpaperAerials.xml" \
            -o wallpaper.xml
          echo "wallpaper.xml: $(wc -c < wallpaper.xml) bytes"
          head -100 wallpaper.xml

      - name: Try other asset catalog URLs
        run: |
          for URL in \
            "https://mesu.apple.com/assets/com_apple_MobileAsset_TVWallpaperAerials/com_apple_MobileAsset_TVWallpaperAerials.xml" \
            "https://mesu.apple.com/assets/com_apple_MobileAsset_TVIdleAssets/com_apple_MobileAsset_TVIdleAssets.xml" \
            "https://mesu.apple.com/assets/com_apple_MobileAsset_TVWallpaper/com_apple_MobileAsset_TVWallpaper.xml" \
            "https://mesu.apple.com/assets/tvos/com_apple_MobileAsset_TVIdleAssets/com_apple_MobileAsset_TVIdleAssets.xml"; do
            echo "=== $URL ==="
            SIZE=$(curl -sf "$URL" -o tmp.xml 2>/dev/null && wc -c < tmp.xml || echo "FAIL")
            echo "size: $SIZE"
            if [[ "$SIZE" -gt 100 ]] 2>/dev/null; then
              grep -i "snoopy\|aerial\|wallpaper\|__RelativePath\|url" tmp.xml | head -10
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: fw-results
          path: "*.xml"
          if-no-files-found: ignore
          retention-days: 2
