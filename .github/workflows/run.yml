on: push
jobs:
  go:
    runs-on: macos-latest
    timeout-minutes: 300
    steps:
      - name: Find and mount tvOS runtime disk image
        run: |
          echo "=== Runtimes directory ==="
          ls -la /Library/Developer/CoreSimulator/Profiles/Runtimes/
          find /Library/Developer/CoreSimulator/Profiles/Runtimes/ -maxdepth 3 2>/dev/null | head -30

          echo "=== Find disk image files ==="
          find /Library/Developer/CoreSimulator -name "*.dmg" -o -name "*.img" -o -name "*.cryptex" 2>/dev/null | head -20

          echo "=== xcrun simctl runtime show ==="
          xcrun simctl runtime show "BE1675DE-8C48-49F8-9DCB-EFA5AB312771" 2>&1

      - name: Mount tvOS 18.5 runtime
        run: |
          # Get the disk image path
          DMGPATH=$(xcrun simctl runtime show "BE1675DE-8C48-49F8-9DCB-EFA5AB312771" 2>&1 | grep -i "path\|dmg\|image" | head -3)
          echo "DMG info: $DMGPATH"

          # Try to mount using simctl
          xcrun simctl runtime match "BE1675DE-8C48-49F8-9DCB-EFA5AB312771" 2>&1 || true

          # Check if volume got populated
          ls /Library/Developer/CoreSimulator/Volumes/tvOS_22L572/ 2>/dev/null
          echo "Vol contents: $(ls /Library/Developer/CoreSimulator/Volumes/tvOS_22L572/ 2>/dev/null | wc -l) files"

          # Find .mov files anywhere on the system (excluding noise)
          echo "=== All .mov files on system ==="
          find /Library/Developer/CoreSimulator/ -name "*.mov" 2>/dev/null | head -30
