on: push
jobs:
  go:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find all URLs and newer manifests
        run: python3 find_all_urls.py

      - uses: actions/upload-artifact@v4
        with:
          name: url-lists
          path: |
            urls_4k_sdr.txt
            urls_all.txt
          retention-days: 5
