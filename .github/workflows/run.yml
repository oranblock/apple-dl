on: push
jobs:
  go:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get IPSW URL
        run: python3 get_ipsw_url.py | tee ipsw_info.txt

      - name: Download partial IPSW
        run: |
          URL=$(grep "^IPSW_URL=" ipsw_info.txt | cut -d= -f2-)
          echo "Downloading: $URL"
          curl -L -r 0-52428800 "$URL" -o partial.ipsw
          ls -lh partial.ipsw

      - name: List IPSW contents
        run: python3 list_ipsw.py

      - uses: actions/upload-artifact@v4
        with:
          name: ipsw-info
          path: ipsw_info.txt
          retention-days: 1
