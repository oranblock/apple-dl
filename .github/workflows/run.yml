on: push
jobs:
  go:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Search for Snoopy aerial online
        run: |
          pip install yt-dlp -q
          echo "=== YouTube search ==="
          yt-dlp --get-url "ytsearch3:Apple TV Snoopy Space aerial screensaver 4K" 2>&1 | head -20
          echo "=== Archive.org ==="
          curl -s "https://archive.org/search?query=apple+aerial+snoopy&output=json" | python3 -c "import json,sys; d=json.load(sys.stdin); [print(i.get('identifier',''), i.get('title','')) for i in d.get('response',{}).get('docs',[])[:10]]" 2>&1
