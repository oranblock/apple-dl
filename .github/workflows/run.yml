on: push
jobs:
  go:
    runs-on: macos-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Install ipsw
        run: brew install blacktop/tap/ipsw

      - name: Download IPSW and extract small files
        run: |
          URL="https://updates.cdn-apple.com/2026WinterFCS/fullrestores/089-59495/6689ECF8-1BE4-4250-BECB-5BB9AE719DC0/AppleTV5,3_26.3_23K620_Restore.ipsw"
          curl -L --progress-bar "$URL" -o Restore.ipsw
          unzip -o Restore.ipsw "*.dmg" "*.plist" -d extracted/
          ls -lh extracted/
          file extracted/*.dmg

      - name: Strings search on unencrypted DMGs
        run: |
          for dmg in extracted/*.dmg; do
            echo "=== strings $dmg ==="
            strings "$dmg" | grep -iE "aerial|snoopy|screensaver|TVIdle|updates\.cdn|sylvan|wallpaper|CDN|mesu|\.mov|\.m4v" | head -30
          done

      - name: Try ipsw remote extract
        run: |
          URL="https://updates.cdn-apple.com/2026WinterFCS/fullrestores/089-59495/6689ECF8-1BE4-4250-BECB-5BB9AE719DC0/AppleTV5,3_26.3_23K620_Restore.ipsw"
          ipsw extract --remote "$URL" --dyld -o dyld_out/ 2>&1 | head -20 || true
          ipsw extract --remote "$URL" --kernel -o kernel_out/ 2>&1 | head -20 || true

      - name: Strings search dyld/kernel
        run: |
          for dir in dyld_out kernel_out; do
            if ls "$dir"/ 2>/dev/null; then
              echo "=== $dir ==="
              find "$dir" -type f | xargs strings 2>/dev/null | grep -iE "aerial|snoopy|TVIdle|screensaver|updates\.cdn-apple|sylvan\.apple|mesu\.apple|\.mov" | sort -u | head -50
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: strings-results
          path: |
            extracted/*.plist
          retention-days: 2
        if: always()
