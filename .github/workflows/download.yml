name: Download Apple Aerial
on:
  workflow_dispatch:

jobs:
  download:
    runs-on: macos-latest
    steps:
      - name: Find and download Snoopy Space
        run: |
          # Fetch Apple TV aerial manifest
          curl -s -A "AppleTV11,1/1 AtVUI" \
            "https://sylvan.apple.com/Apple_TV_4K_v3.json" -o manifest.json
          echo "Manifest size: $(wc -c < manifest.json) bytes"

          # Extract Snoopy URL
          SNOOPY_URL=$(python3 -c "
import json, sys
with open('manifest.json') as f:
    data = json.load(f)
for a in data.get('assets', []):
    url = a.get('url', '')
    if 'snoopy' in url.lower() or 'SNOOPY' in url:
        print(url)
        break
")
          echo "Found URL: $SNOOPY_URL"

          # Download it
          if [ -n "$SNOOPY_URL" ]; then
            curl -L -o snoopy_space.mov "$SNOOPY_URL"
          else
            echo "URL not found in manifest, trying direct URL..."
            # Try alternative manifest
            curl -s -A "AppleTV11,1/1 AtVUI" \
              "https://sylvan.apple.com/Apple_TV_4K_v2.json" -o manifest2.json
            python3 -c "
import json
with open('manifest2.json') as f:
    data = json.load(f)
for a in data.get('assets', []):
    url = a.get('url', '')
    if 'snoopy' in url.lower() or 'SNOOPY' in url:
        print('Found in v2:', url)
"
            # Dump all URLs for inspection
            python3 -c "
import json
with open('manifest.json') as f:
    data = json.load(f)
for a in data.get('assets', [])[:10]:
    print(a.get('url',''))
" > urls_sample.txt
            cat urls_sample.txt
          fi

          ls -lh snoopy_space.mov 2>/dev/null || echo "Download failed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snoopy_space
          path: |
            snoopy_space.mov
            urls_sample.txt
          retention-days: 5
