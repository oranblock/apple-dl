name: Fetch Aerial
on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: macos-latest
    steps:
      - name: Get manifest and find Snoopy URL
        run: |
          curl -s -A "AppleTV11,1/1 AtVUI" \
            "https://sylvan.apple.com/Apple_TV_4K_v3.json" -o manifest.json
          echo "Manifest bytes: $(wc -c < manifest.json)"
          python3 -c "
import json
with open('manifest.json') as f:
    data = json.load(f)
print('Total assets:', len(data.get('assets',[])))
for a in data.get('assets', []):
    url = a.get('url','')
    if 'snoopy' in url.lower():
        print('FOUND:', url)
for a in data.get('assets', [])[:5]:
    print('SAMPLE:', a.get('url',''))
"

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: manifest.json
          retention-days: 2
